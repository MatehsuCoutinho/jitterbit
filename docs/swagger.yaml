openapi: 3.0.0
info:
  title: API Documentation
  version: 1.0.0
  description: Documentação da API com autenticação JWT e gerenciamento de pedidos

servers:
  - url: http://localhost:3000
    description: Servidor local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          example: usuario@email.com

    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: usuario@email.com
        password:
          type: string
          minLength: 8
          description: |
            Deve conter no mínimo 8 caracteres, ao menos uma letra maiúscula e ao menos um número.
          example: Senha123

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: usuario@email.com
        password:
          type: string
          example: Senha123

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    ZodIssue:
      type: object
      properties:
        field:
          type: string
          description: Caminho do campo inválido
          example: password
        message:
          type: string
          description: Mensagem de erro do campo
          example: Deve conter ao menos uma letra maiúscula

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Dados inválidos
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ZodIssue'
      example:
        message: Dados inválidos
        errors:
          - field: email
            message: E-mail inválido
          - field: password
            message: Deve conter ao menos uma letra maiúscula
          - field: password
            message: Deve conter ao menos um número

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Mensagem de erro

    ItemRequest:
      type: object
      required:
        - idItem
        - quantidadeItem
        - valorItem
      properties:
        idItem:
          type: string
          example: "42"
        quantidadeItem:
          type: integer
          example: 2
        valorItem:
          type: number
          format: float
          example: 49.99

    OrderRequest:
      type: object
      required:
        - numeroPedido
        - valorTotal
        - dataCriacao
        - items
      properties:
        numeroPedido:
          type: string
          example: PED-001
        valorTotal:
          type: number
          format: float
          example: 99.98
        dataCriacao:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemRequest'

    Item:
      type: object
      properties:
        id:
          type: integer
          example: 1
        orderId:
          type: string
          example: PED-001
        productId:
          type: integer
          example: 42
        quantity:
          type: integer
          example: 2
        price:
          type: number
          format: float
          example: 49.99

    Order:
      type: object
      properties:
        orderId:
          type: string
          example: PED-001
        value:
          type: number
          format: float
          example: 99.98
        creationDate:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        items:
          type: array
          items:
            $ref: '#/components/schemas/Item'

    DeleteResponse:
      type: object
      properties:
        message:
          type: string
          example: Pedido deletado com sucesso

paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Registra um novo usuário
      description: |
        Cria um novo usuário com e-mail e senha. A senha é criptografada antes de ser armazenada.

        **Regras de validação da senha:**
        - Mínimo de 8 caracteres
        - Ao menos uma letra maiúscula
        - Ao menos um número
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Dados inválidos (Zod) ou e-mail já cadastrado
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                zod_error:
                  summary: Erro de validação Zod
                  value:
                    message: Dados inválidos
                    errors:
                      - field: password
                        message: Deve conter ao menos uma letra maiúscula
                      - field: password
                        message: Deve conter ao menos um número
                email_taken:
                  summary: E-mail já cadastrado
                  value:
                    message: E-mail já cadastrado

  /auth/login:
    post:
      tags:
        - Auth
      summary: Autentica o usuário e retorna o token JWT
      description: |
        Valida as credenciais e retorna um token JWT com validade de **1 dia**.

        O token deve ser enviado no header `Authorization: Bearer <token>` nas rotas protegidas.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Credenciais inválidas

  /order:
    post:
      tags:
        - Orders
      summary: Cria um novo pedido
      description: |
        Recebe os dados do pedido em português (conforme o mapper) e persiste no banco.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
      responses:
        '201':
          description: Pedido criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                zod_error:
                  summary: Erro de validação Zod
                  value:
                    message: Dados inválidos
                    errors:
                      - field: items.0.valorItem
                        message: Expected number, received string
                generic_error:
                  summary: Erro genérico
                  value:
                    message: Nenhum dado enviado para atualização
        '401':
          description: Não autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /order/list:
    get:
      tags:
        - Orders
      summary: Retorna todos os pedidos
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de pedidos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '401':
          description: Não autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /order/{id}:
    get:
      tags:
        - Orders
      summary: Busca um pedido pelo ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: PED-001
      responses:
        '200':
          description: Pedido encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Pedido não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Pedido não encontrado
        '401':
          description: Não autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Orders
      summary: Atualiza os dados de um pedido existente
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: PED-001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
      responses:
        '200':
          description: Pedido atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Dados inválidos ou body vazio
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                zod_error:
                  summary: Erro de validação Zod
                  value:
                    message: Dados inválidos
                    errors:
                      - field: items.0.valorItem
                        message: Expected number, received string
                empty_body:
                  summary: Body vazio
                  value:
                    message: Nenhum dado enviado para atualização
        '404':
          description: Pedido não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Pedido PED-001 não encontrado
        '401':
          description: Não autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Orders
      summary: Remove um pedido pelo ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: PED-001
      responses:
        '200':
          description: Pedido deletado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '404':
          description: Pedido não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Pedido não encontrado
        '401':
          description: Não autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'